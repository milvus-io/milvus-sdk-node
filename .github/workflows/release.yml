name: Publish package to npm

on:
  release:
    types: [released, prereleased]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run npm publish without publishing'
        required: true
        default: true
        type: boolean

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: yarn

      - name: update submodules
        run: |
          git submodule init
          yarn pre

      - name: Generate proto json
        run: |
          yarn proto:json

      - name: Build app
        run: |
          yarn build

      - name: Publish to npm
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "🔍 Testing npm authentication (dry run)..."
            npm publish --dry-run
            echo "✅ Authentication successful! Trusted publishing is working."
          else
            VERSION=$(node -p "require('./package.json').version")
            VERSION_TAG=$(node -p "require('./package.json').version.split('.').slice(0, 2).join('.')")

            echo "📦 Publishing to npm..."
            if [ "${{ github.event.release.prerelease }}" = "true" ]; then
              NPM_TAG=next
            elif [ "${{ github.event.release.make_latest }}" = "true" ]; then
              NPM_TAG=latest
            else
              NPM_TAG="$VERSION_TAG"
            fi
            echo "Publishing version $VERSION with npm dist-tag $NPM_TAG"
            npm publish --tag "$NPM_TAG"
            echo "✅ Published successfully!"
          fi
