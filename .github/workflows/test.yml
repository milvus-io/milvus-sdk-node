name: Run tests and coverage

on:
  pull_request:
    branches:
      - main
      - 2.4
      - 2.5
    types: [opened, synchronize]
    paths-ignore:
      - '.github/**'
      - '*.md'
      - 'examples/**'
      - 'docs/**'
  push:
    branches:
      - main
      - 2.4
      - 2.5
    paths-ignore:
      - '.github/**'
      - '*.md'
      - 'examples/**'
      - 'docs/**'
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Read package.json
        uses: jaywcjlove/github-action-package@main
        id: info

      - name: Show target Milvus version
        run: echo "Milvus Version is ${{ steps.info.outputs.milvusVersion }}"

      - name: Run target Milvus
        env:
          MILVUS_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          wget https://raw.githubusercontent.com/milvus-io/milvus/master/deployments/docker/standalone/docker-compose.yml -O docker-compose.yml
          sed -i -e "s/milvusdb.*$/milvusdb\/milvus:${{ steps.info.outputs.milvusVersion }}/g" docker-compose.yml

          # Use docker-compose override to pass OpenAI key
          cat > docker-compose.override.yml << EOF
          services:
            standalone:
              environment:
                MQ_TYPE: rocksmq
                MILVUS_OPENAI_API_KEY: ${MILVUS_OPENAI_API_KEY}
          EOF

          mkdir -p volumes/etcd volumes/minio volumes/milvus
          chmod -R 777 volumes

          docker compose -f docker-compose.yml -f docker-compose.override.yml up -d
          docker compose -f docker-compose.yml -f docker-compose.override.yml ps

      - name: Wait for MinIO to be ready
        run: |
          echo "Waiting for MinIO..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live > /dev/null 2>&1; then
              echo "MinIO is ready"
              exit 0
            fi
            echo "Attempt $i/30..."
            sleep 2
          done
          echo "MinIO did not become ready"
          docker compose -f docker-compose.yml -f docker-compose.override.yml ps
          docker logs milvus-minio
          exit 1

      - name: Wait for Milvus to be ready
        run: |
          echo "Waiting for Milvus..."
          for i in $(seq 1 90); do
            if curl -sf http://localhost:9091/healthz > /dev/null 2>&1 && timeout 1 bash -c '</dev/tcp/127.0.0.1/19530' > /dev/null 2>&1; then
              echo "Milvus is ready"
              exit 0
            fi
            echo "Attempt $i/90..."
            if [ $((i % 10)) -eq 0 ]; then
              docker compose -f docker-compose.yml -f docker-compose.override.yml ps
            fi
            sleep 2
          done
          echo "Milvus did not become ready"
          docker compose -f docker-compose.yml -f docker-compose.override.yml ps
          docker logs milvus-standalone
          exit 1

      - name: Dump Milvus logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.override.yml ps
          docker logs milvus-standalone
          docker logs milvus-etcd
          docker logs milvus-minio

      - name: Install dependencies
        run: yarn

      - name: update submodules
        run: |
          git submodule init
          yarn pre

      - name: Run Test coverage
        run: |
          yarn build-test
          yarn coverage

      - name: send to codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: bash <(curl -s https://codecov.io/bash)
